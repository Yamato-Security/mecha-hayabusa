# =============================================================================
# Mecha Hayabusa Documentation Site — Material for MkDocs
# -----------------------------------------------------------------------------
# Hosted for free on GitHub Pages (see ../.github/workflows/docs.yml).
# Top tabs = main topics, left sidebar = subtopics.
# >>> If you fork/rename, update site_url, repo_url and repo_name below. <<<
# =============================================================================

site_name: Mecha Hayabusa
site_description: >-
  Mecha Hayabusa is an AI analyzer, DFIR timeline and report generation tool for Hayabusa results.
site_author: Yamato Security
site_url: https://yamato-security.github.io/mecha-hayabusa/

repo_url: https://github.com/Yamato-Security/mecha-hayabusa
repo_name: Yamato-Security/mecha-hayabusa
edit_uri: edit/main/website/docs/

copyright: >-
  Copyright &copy; Yamato Security — Documentation built with Material for MkDocs

docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/favicon.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      auto_caption: false
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
          site_name: Mecha Hayabusa ドキュメント
          nav_translations:
